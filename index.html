<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#F4F9FD">
    <meta property="og:title" content="Casamento Davi & Camila | 04.07.2026">
    <meta property="og:description" content="Prepare-se para o grande dia! Acesse para ver nossa história, locais e confirmar sua presença.">
    <meta property="og:image" content="https://davi-e-camila.vercel.app/assets/img/share-image.jpg">
    <meta property="og:url" content="https://davi-e-camila.vercel.app/">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="pt_BR">
    
    <title>Davi & Camila</title>
    
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/glass.css">
</head>
<body>
    <div class="noise-overlay"></div>

    <nav class="navbar" id="mainNav">
        <div class="nav-logo">
            <img src="assets/img/logo_casamento-aquarela.PNG" alt="D&C" class="logo-img">
        </div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Início</a></li>
            <li><a href="cerimonia.html">Cerimônia</a></li>
            <li><a href="presentes.html">Presentes</a></li>
        </ul>
    </nav>

    <header class="hero-section">
        <div class="hero-bg">
            <picture>
                <source media="(min-width: 768px)" srcset="assets/img/hero-pc.png">
                <img src="assets/img/hero-cll.PNG" alt="Foto do Casal" class="hero-img">
            </picture>
        </div>

        <div class="hero-overlay"></div>

        <div class="hero-content">
            <h1 class="main-title">Davi & Camila</h1>
            <p class="hero-date">04 . 07 . 2026</p>
        </div>

        <div class="scroll-indicator bounce-animation">↓</div>
    </header>

    <section class="countdown-bar glass-bar">
        <div id="countdown"></div>
    </section>

    <main class="container">
    <section class="section-history grid-layout">
        <div class="glass-card" style="position: relative;">
            <div id="adminHistoryBtn" class="admin-controls hidden">
                <button class="btn-glass-icon edit" onclick="abrirModalHistoria()"><i class="ph ph-pencil-simple"></i></button>
            </div>
            <h2>Nossa História</h2>
            <p class="mt-small" id="historiaText">Carregando nossa história...</p>
        </div>
        
        <div class="glass-card img-placeholder" style="position: relative; padding: 0; overflow: hidden; min-height: 300px;">
            <div id="adminHistoryImgBtn" class="admin-controls hidden">
                <button class="btn-glass-icon edit" onclick="abrirModalHistoriaImg()"><i class="ph ph-camera"></i></button>
            </div>
            <img id="historiaImg" src="" alt="Nossa História" style="width: 100%; height: 100%; object-fit: cover; display: none;">
            <p id="historiaImgPlaceholder">Foto da História</p>
        </div>
    </section>
    
    <section class="section-gallery">
        <div class="glass-card text-center" style="position: relative;">
            <div id="adminGalleryBtn" class="admin-controls hidden" style="justify-content: center; position: relative; top: 0; right: 0; margin-bottom: 20px;">
                <button class="btn-outline" style="display: flex; gap: 8px; align-items: center; margin: 0 auto;" onclick="abrirModalGaleria()">
                    <i class="ph ph-plus"></i> Adicionar Foto
                </button>
            </div>
            <h2>Galeria</h2>
            <p>Nossos momentos especiais.</p>
            
            <div id="galleryContainer" class="carousel-container mt-small">
                </div>
        </div>
    </section>
</main>

    <footer class="footer">
    <p>Davi & Camila 2026
        <span id="triggerAdmin" style="cursor: pointer; opacity: 0.1;">&pi;</span>
    </p>
</footer>

<div id="modalLogin" class="modal-overlay hidden">
    <div class="modal-content" style="max-width: 300px;">
        <span class="close-modal" onclick="fecharModais()">&times;</span>
        <h2>Área Restrita</h2>
        <input type="email" id="adminEmail" placeholder="Email" style="width:100%; margin-bottom:10px; padding:8px;">
        <input type="password" id="adminPass" placeholder="Senha" style="width:100%; margin-bottom:10px; padding:8px;">
        <button id="btnLogin" class="btn-primary">Entrar</button>
    </div>
</div>

<div id="modalHistoria" class="modal-overlay hidden">
    <div class="modal-content">
        <span class="close-modal" onclick="fecharModais()">&times;</span>
        <h2>Editar História</h2>
        <textarea id="editHistoriaText" rows="6" style="width:100%; padding:10px; border-radius:12px; margin-bottom:15px;"></textarea>
        <button id="btnSaveHistoria" class="btn-primary">Salvar Texto</button>
    </div>
</div>

<div id="modalUploadInfo" class="modal-overlay hidden">
    <div class="modal-content">
        <span class="close-modal" onclick="fecharModais()">&times;</span>
        <h2 id="uploadTitle">Adicionar Imagem</h2>
        <input type="file" id="uploadFile" accept="image/*" style="width:100%; margin-bottom:15px;">
        <p id="uploadStatus" style="font-size: 0.8rem; color: blue; font-weight: bold; margin-bottom: 10px;"></p>
        <button id="btnSaveUpload" class="btn-primary">Fazer Upload</button>
    </div>
</div>

    <script src="assets/js/main.js"></script>
    <script type="module" src="assets/js/home.js"></script>
</body>
</html>
