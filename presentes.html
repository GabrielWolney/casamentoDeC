<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Lista de Presentes</title>
    </head>
<body>

    <header id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo-link">
                <img src="assets/img/logo_casamento-aquarela.PNG" alt="D&C" class="logo-img">
            </a>
            <nav class="menu-links">
                <a href="index.html">Início</a>
                <a href="cerimonia.html">Cerimônia</a>
                <a href="presentes.html" class="active">Presentes</a> </nav>
        </div>
    </header>

    <main style="padding-top: 80px;">

        <section class="section-padding">
            <div class="container">
                <h2 class="section-title text-center">Lista de Presentes</h2>
                <div class="divider"><i class="fa-solid fa-gift"></i></div>
                <p class="text-center max-width-600 mb-2">
                    Cotas simbólicas<br>
                    Fique à vontade para escolher entre PIX (sem taxas) ou Cartão.
                </p>

                <div id="grid-presentes" class="gift-grid">
                    <div class="loading-state">Carregando presentes...</div>
                </div>
            </div>
        </section>

    </main>

    <div id="modal-pix" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="close-modal" id="btn-close-modal">×</button>
            <div class="modal-header">
                <i class="fa-brands fa-pix pix-icon"></i>
                <h3>Presentear com PIX</h3>
            </div>
            <div class="modal-body">
                <p>Você escolheu: <strong id="modal-gift-name">...</strong></p>
                <p class="modal-price" id="modal-gift-price">...</p>
                
                <div class="pix-key-box">
                    <code id="pix-key"></code>
                    <button id="btn-copy-pix" class="btn-outline">Copiar</button>
                </div>
                
                <a href="#" id="btn-whatsapp" target="_blank" class="btn-whatsapp">Enviar Comprovante</a>
            </div>
        </div>
    </div>

    <script src="js/gifts.js"></script> <script src="js/main.js"></script>
</body>
</html>
