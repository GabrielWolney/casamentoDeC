<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Presentes - Davi & Camila</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/glass.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <meta property="og:title" content="Lista de Presentes - Davi & Camila">
<meta property="og:description" content="Ajude-nos a realizar nossa Lua de Mel dos sonhos! Veja as opções de presentes.">
<meta property="og:image" content="https://davi-e-camila.vercel.app/assets/img/share-image.jpg">
<meta property="og:url" content="https://davi-e-camila.vercel.app/presentes.html">
<meta property="og:type" content="website">
</head>
<body>
    <div class="noise-overlay"></div>

    <nav class="navbar" id="mainNav">
        <div class="nav-logo">
            <img src="assets/img/logo_casamento-aquarela.PNG" alt="D&C" class="logo-img">
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Início</a></li>
            <li><a href="cerimonia.html">Cerimônia</a></li>
            <li><a href="presentes.html" class="active">Presentes</a></li>
        </ul>
    </nav>

    <main class="container">
        <header class="page-header">
            <h1>Lista de Presentes</h1>
            <p>Ajude-nos a construir nossa Lua de Mel.</p>
        </header>

        <div class="gifts-grid">
            <div class="glass-card">
                <div class="gift-img-placeholder"></div>
                <h3>Jantar Romântico</h3>
                <p class="gift-price">R$ 150,00</p>
                <button class="btn-primary" onclick="openGiftModal('Jantar Romântico', 150)">Presentear</button>
            </div>

            <div class="glass-card">
                <div class="gift-img-placeholder"></div>
                <h3>Passeio de Barco</h3>
                <p class="gift-price">R$ 300,00</p>
                <button class="btn-primary" onclick="openGiftModal('Passeio de Barco', 300)">Presentear</button>
            </div>
            
             <div class="glass-card">
                <div class="gift-img-placeholder"></div>
                <h3>Cota Livre</h3>
                <p class="gift-price">Valor que desejar</p>
                <button class="btn-outline" onclick="openGiftModal('Cota Livre', 0)">Enviar Pix</button>
            </div>
        </div>
    </main>

    <div id="paymentModal" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="close-modal">&times;</button>
            <h2 id="modalTitle">Nome do Presente</h2>
            <p id="modalPrice" class="modal-price-highlight">R$ 0,00</p>
            
            <div class="pix-box">
                <span class="pix-label">Chave PIX:</span>
                <span id="pixKey">000.000.000-00</span>
            </div>
            
            <button class="btn-primary btn-copy mb-small">Copiar Chave</button>
            <a href="#" id="whatsappLink" target="_blank" class="btn-outline">Enviar Comprovante</a>
        </div>
    </div>

    <footer class="footer">
        <p>Davi & Camila 2026</p>
    </footer>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/pix.js"></script>
</body>
</html>
