<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Presentes - Davi & Camila</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/glass.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="noise-overlay"></div>

    <nav class="navbar" id="mainNav">
        <div class="nav-logo">
            <img src="assets/img/logo_casamento-aquarela.PNG" alt="D&C" class="logo-img">
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Início</a></li>
            <li><a href="cerimonia.html">Cerimônia</a></li>
            <li><a href="presentes.html" class="active">Presentes</a></li>
        </ul>
    </nav>

    <main class="container">
        <header class="page-header">
            <h1>Lista de Presentes</h1>
            <p>Ajude-nos a construir nossa Lua de Mel.</p>
        </header>

        <div class="gifts-grid" id="giftsContainer">
            <p style="text-align: center; grid-column: 1/-1;">Carregando lista de presentes...</p>
        </div>
    </main>

    <div id="paymentModal" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="close-modal" id="closeModalBtn">&times;</button>
            <h2 id="modalTitle">Nome do Presente</h2>
            <p id="modalPrice" class="modal-price-highlight">R$ 0,00</p>
            
            <div class="pix-box">
                <span class="pix-label">Chave PIX:</span>
                <span id="pixKeyDisplay">CARREGANDO...</span>
            </div>
            
            <button class="btn-primary btn-copy mb-small" id="btnCopyPix">Copiar Chave</button>
            <a href="#" id="whatsappLink" target="_blank" class="btn-outline">Enviar Comprovante</a>
        </div>
    </div>

    <footer class="footer">
        <p>Davi & Camila 2026</p>
    </footer>

    <script src="assets/js/main.js"></script>
    <script type="module" src="assets/js/lista-presentes.js"></script>
</body>
</html>
